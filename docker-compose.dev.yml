version: '3.8'

# ApexAurum Local - Development Environment
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # ============================================
  # PostgreSQL - Primary Database
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: apex_postgres
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (FastAPI)
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: apex_api
    environment:
      DATABASE_URL: postgresql+asyncpg://apex:apex_dev_password@postgres:5432/apex
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOCAL_MODE: "true"
      LOCAL_DEFAULT_USER_EMAIL: "local@apexaurum.local"
      LOCAL_DEFAULT_USER_PASSWORD: "apex"
      VAULT_PATH: "/app/data"
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - apex_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # Frontend (Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: apex_frontend
    environment:
      VITE_API_URL: "http://localhost:8000"
      VITE_LOCAL_MODE: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host

  # ============================================
  # Adminer - Database GUI (Optional)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: apex_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  apex_data:

networks:
  default:
    name: apex_network
